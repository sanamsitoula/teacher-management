{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">Edit Teacher</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="name" class="form-label">Name *</label>
                <input type="text" class="form-control" id="name" name="name" value="{{ teacher.name }}" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email *</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ teacher.email }}" required>
            </div>
            <div class="mb-3">
                <label for="subject" class="form-label">Subject *</label>
                <input type="text" class="form-control" id="subject" name="subject" value="{{ teacher.subject }}" required>
            </div>
            <div class="mb-3">
                <label for="phone" class="form-label">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone" value="{{ teacher.phone or '' }}">
            </div>
            <div class="mb-3">
                <label for="hire_date" class="form-label">Hire Date *</label>
                <input type="date" class="form-control" id="hire_date" name="hire_date" value="{{ teacher.hire_date }}" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-success">Update</button>
                <a href="{{ url_for('teachers.list_teachers') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
