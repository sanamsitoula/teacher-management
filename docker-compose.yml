services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: teacher_db
      MYSQL_USER: teacher_user
      MYSQL_PASSWORD: teacher_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      SECRET_KEY: change-this-to-a-random-secret-key
      DATABASE_URL: mysql+pymysql://teacher_user:teacher_pass@mysql:3306/teacher_db
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  mysql_data:
